services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  app:
    build: .
    container_name: app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - MONGO_URI=mongodb://mongo:27017/devopsdb
      - PORT=80
    depends_on:
      - mongo
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge